<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me?</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            font-family: 'Press Start 2P', monospace;
        }
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .pixel-window {
            background-color: #000000;
            border: 6px double #ffffff; 
            width: 400px;
            max-width: 90%;
            box-shadow: 12px 12px 0px #1a1a1a;
        }

        .window-bar {
            border-bottom: 4px solid #ffffff;
            padding: 10px;
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 8px;
            height: 8px;
            border: 2px solid #ffffff;
        }

        .window-body {
            padding: 50px 20px;
            text-align: center;
        }

        .title-text {
            color: #ffffff;
            font-size: 13pt;
            line-height: 1.6;
            margin: 0 0 45px 0;
            font-weight: normal;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .pixel-btn {
            background: transparent;
            color: #ffffff;
            border: 4px outset #ffffff; 
            padding: 12px 24px;
            font-size: 11pt;
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            outline: none;
        }

        .pixel-btn:hover {
            background: #ffffff;
            color: #000000;
            border: 4px inset #ffffff; 
        }
        .pixel-smiler {
            display: none;
            color: #ffffff;
            font-size: 45pt;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
        }
        .neon-center-set {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            z-index: 6; 
            user-select: none;
            pointer-events: none;
        }
        .neon-text {
            color: #ffccff;
            font-size: 26pt;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 
                0 0 5px #ffccff,
                0 0 15px #ff3399,
                0 0 30px #ff3399;
        }
        .neon-heart-svg {
            width: 140px;
            height: 140px;
            filter: drop-shadow(0 0 4px #ffccff)
                    drop-shadow(0 0 10px #ff3399)
                    drop-shadow(0 0 25px #ff3399)
                    drop-shadow(0 0 45px #ff3399);
            transition: opacity 0.3s ease;
        }

        .heart-piece {
            position: absolute;
            pointer-events: none;
            z-index: 7;
        }

        .heart-piece svg {
            filter: drop-shadow(0 0 4px #ffccff)
                    drop-shadow(0 0 10px #ff3399)
                    drop-shadow(0 0 25px #ff3399)
                    drop-shadow(0 0 45px #ff3399);
        }
        
        #matrixCanvas {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        @keyframes fallPiece {
            0% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, calc(-50% + 500px)) scale(0.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="viewInterface">
        <div class="pixel-window" id="popupWindow">
            <div class="window-bar">
                <span class="window-dot"></span>
                <span class="window-dot"></span>
                <span class="window-dot"></span>
            </div>
            <div class="window-body">
                <h1 class="title-text">Do you love me?</h1>
                <div class="btn-container">
                    <button class="pixel-btn" onclick="triggerYes()">Yes</button>
                    <button class="pixel-btn" onclick="triggerNo()">No</button>
                </div>
            </div>
        </div>
    </div>

    <div class="pixel-smiler" id="smileContainer">:)</div>
    
    <div class="neon-center-set" id="neonSet">
        <div class="neon-text">LOVE ME</div>
        
        <svg class="neon-heart-svg" id="heartSvg" viewBox="0 0 24 24" fill="#ffccff">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        let noClickCount = 0;
        let matrixIntensity = 0.03;
        let heartBroken = false;

        const textToRepeat = "LOVE ME";
        const fontSize = 11; 
        let columns = [];

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const columnWidth = ctx.measureText(textToRepeat).width + 4; 
            const columnCount = Math.floor(canvas.width / columnWidth) + 1;

            columns = [];
            for (let i = 0; i < columnCount; i++) {
                columns.push({
                    x: i * columnWidth,
                    y: Math.random() * -canvas.height
                });
            }
        }

        function drawMatrix() {
            ctx.fillStyle = `rgba(0, 0, 0, ${matrixIntensity})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = `bold ${fontSize}px 'Press Start 2P', monospace`;
            ctx.fillStyle = 'rgba(255, 51, 153, 0.55)'; 

            for (let i = 0; i < columns.length; i++) {
                const col = columns[i];
                ctx.fillText(textToRepeat, col.x, col.y);

                col.y += 6 + (noClickCount * 2);

                if (col.y > canvas.height + fontSize) {
                    col.y = -fontSize;
                }
            }
            animationId = requestAnimationFrame(drawMatrix);
        }

        window.addEventListener('resize', () => {
            if (canvas.style.display === 'block') {
                initMatrix();
            }
        });

        function breakHeart() {
            if (heartBroken) return;
            heartBroken = true;

            const heart = document.getElementById('heartSvg');
            if (!heart) return;

            // Ocultar coração original
            heart.style.opacity = '0';
            heart.style.pointerEvents = 'none';

            // Criar 4 pedaços
            const pieces = [
                { dx: -60, dy: -60, path: "M12 12l-1-1C8 8 5 8 5 6c0-2 1-3 2.5-3 1 0 2 0.5 2.5 1 .5-.5 1.5-1 2.5-1 1.5 0 2.5 1 2.5 3 0 2-3 2-6 5l-1 1z" },
                { dx: 60, dy: -60, path: "M12 12l1-1c3-2 6-2 6-4 0-2-1-3-2.5-3-1 0-2 0.5-2.5 1-.5-.5-1.5-1-2.5-1-1.5 0-2.5 1-2.5 3 0 2 3 2 6 5l1 1z" },
                { dx: -60, dy: 60, path: "M12 12l-1 1C8 16 5 16 5 18c0 2 1 3 2.5 3 1 0 2-0.5 2.5-1 .5.5 1.5 1 2.5 1 1.5 0 2.5-1 2.5-3 0-2-3-2-6-5l-1-1z" },
                { dx: 60, dy: 60, path: "M12 12l1 1c3 2 6 2 6 4 0 2-1 3-2.5 3-1 0-2-0.5-2.5-1-.5.5-1.5 1-2.5 1-1.5 0-2.5-1-2.5-3 0-2 3 2 6 5l1 1z" }
            ];

            pieces.forEach((piece, index) => {
                const container = document.createElement('div');
                container.className = 'heart-piece';
                container.style.left = '50%';
                container.style.top = '50%';
                
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 24 24');
                svg.setAttribute('fill', '#ffccff');
                svg.style.width = '70px';
                svg.style.height = '70px';
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z");
                svg.appendChild(path);
                
                container.appendChild(svg);
                document.body.appendChild(container);
                
                // Ativar animação
                setTimeout(() => {
                    container.style.animation = `fallPiece ${0.9 + index * 0.05}s ease-in forwards`;
                    container.style.left = `calc(50% + ${piece.dx}px)`;
                    container.style.top = `calc(50% + ${piece.dy}px)`;
                }, 10);
                
                setTimeout(() => container.remove(), 1500);
            });
        }

        function triggerYes() {
            cancelAnimationFrame(animationId);
            document.getElementById('viewInterface').style.display = 'none';
            document.getElementById('smileContainer').style.display = 'block';
            document.getElementById('neonSet').style.display = 'none';
            canvas.style.display = 'none';
        }

        function triggerNo() {
            noClickCount++;
            matrixIntensity = Math.min(0.15, 0.03 + (noClickCount * 0.02));

            const frame = document.getElementById('popupWindow');
            frame.style.transform = 'translate(4px, 4px)';
            setTimeout(() => frame.style.transform = 'translate(-4px, -4px)', 40);
            setTimeout(() => frame.style.transform = 'translate(4px, -4px)', 80);
            
            setTimeout(() => {
                document.getElementById('viewInterface').style.display = 'none';
                
                initMatrix();
                canvas.style.display = 'block';
                setTimeout(() => canvas.style.opacity = '1', 10);
                
                drawMatrix();
                document.getElementById('neonSet').style.display = 'flex';
                
                // Quebrar coração!
                breakHeart();
            }, 130);
        }
    </script>
</body>
</html>
